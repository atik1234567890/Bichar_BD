<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ঘটনার বিবরণ — BicharBD</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Tiro+Bangla&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .incident-detail {
            max-width: 800px;
            margin: 60px auto;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 50px;
        }
        .incident-id {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--blood);
            margin-bottom: 20px;
            display: block;
        }
        .incident-title {
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 30px;
        }
        .incident-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-dim);
        }
        .incident-desc {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-dim);
            margin-bottom: 40px;
        }
        .source-link {
            display: inline-block;
            background: var(--border);
            padding: 10px 20px;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: background 0.3s;
        }
        .source-link:hover {
            background: var(--blood);
        }
    </style>
</head>
<body>
    <header>
        <div class="container nav-container">
            <div class="logo">BICHAR_BD</div>
            <nav class="nav-links">
                <a href="/" class="nav-link">Home</a>
                <a href="/submit" class="nav-link">Submit Report</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <div class="incident-detail" id="incident-content">
            <!-- Populated by JS -->
            <div class="loading">Loading incident details...</div>
        </div>
    </div>

    <script>
        const incidentId = "{{ incident_id }}";
        
        async function fetchIncident() {
            try {
                const response = await fetch(`/api/incidents/${incidentId}`);
                const result = await response.json();
                
                if (result.success) {
                    const inc = result.data;
                    const content = document.getElementById('incident-content');
                    
                    const date = new Date(inc.created_at).toLocaleDateString('bn-BD');
                    
                    content.innerHTML = `
                        <span class="incident-id">${inc.incident_id}</span>
                        <h1 class="incident-title">${inc.title}</h1>
                        <div class="incident-meta">
                            <span>${inc.incident_type.toUpperCase()}</span>
                            <span>•</span>
                            <span>${inc.district}, ${inc.division}</span>
                            <span>•</span>
                            <span>${date}</span>
                        </div>
                        <div class="incident-desc">
                            ${inc.description}
                        </div>
                        <div class="status-badge mb-8">
                            <span class="text-[0.7rem] font-mono uppercase tracking-widest text-blood">Status: ${inc.status}</span>
                        </div>
                        ${inc.source_url ? `<a href="${inc.source_url}" target="_blank" class="source-link">View Original Source</a>` : ''}
                    `;
                }
            } catch (error) {
                console.error('Error fetching incident:', error);
            }
        }
        
        fetchIncident();
    </script>
</body>
</html>
